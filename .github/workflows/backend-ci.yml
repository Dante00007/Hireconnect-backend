name: Backend CI

on:

  push:

    branches:
      - main

  pull_request:

    branches:
      - main

jobs:

  docker-build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code

        uses: actions/checkout@v4

      - name: Set up Docker Buildx

        uses: docker/setup-buildx-action@v3

      - name: Build Auth Service

        run: docker compose build auth-service

      - name: Build Profile Service

        run: docker compose build profile-service

      - name: Build Job Service

        run: docker compose build job-service

      - name: Build Application Service

        run: docker compose build application-service

      - name: Build Interview Service

        run: docker compose build interview-service

      - name: Build Notification Service

        run: docker compose build notification-service

      - name: Build Gateway

        run: docker compose build gateway